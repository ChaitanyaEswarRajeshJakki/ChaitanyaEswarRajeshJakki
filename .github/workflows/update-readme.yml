name: Update Profile (README + Infographic + Resume PDF)

# Run manually from the Actions tab whenever you want to sync all profiles.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --quiet \
            requests \
            google-generativeai \
            reportlab

      - name: Run updater
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/update_all.py

      - name: Commit & push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md \
                  interactive-resume-infographic/infographic.html \
                  scripts/resume_data.json \
                  "Jakki_Chaitanya_Eswar_Rajesh_*.pdf"
          # Exit cleanly if nothing changed
          git diff --cached --quiet && echo "Nothing to commit." && exit 0
          git commit -m "chore: auto-update profiles from repo commits [skip ci]"
          git push
